name: Continuous Deployment Of Main Branch

on:
    push:
        branches: [main] # Run only on main branch push event.
    workflow_dispatch: # Manual trigger option.
    schedule:
        - cron: '0 0 * * 6' # Automatic trigger on every Saturday 00:00 AM UTC.

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    deploy_main_branch:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write
            security-events: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Lint Dockerfile
              uses: hadolint/hadolint-action@v3.3.0
              with:
                dockerfile: Dockerfile

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Install cosign
              uses: sigstore/cosign-installer@v4.0.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                registry: ${{ env.REGISTRY }}
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                tags: |
                    # Always set 'latest' tag (this workflow only runs from main)
                    type=raw,value=latest

            - name: Build and push Docker image
              id: build
              uses: docker/build-push-action@v6
              with:
                context: .
                platforms: linux/amd64
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
                cache-from: type=gha
                cache-to: type=gha,mode=max

            - name: Run Trivy vulnerability scanner (table output)
              uses: aquasecurity/trivy-action@0.28.0
              with:
                image-ref: ${{ steps.meta.outputs.tags }}
                format: 'table'
                severity: 'CRITICAL,HIGH,MEDIUM,LOW'
                exit-code: '0' # Don't fail the build on vulnerabilities, just report the findings.

            - name: Run Trivy vulnerability scanner (SARIF output)
              uses: aquasecurity/trivy-action@0.28.0
              with:
                image-ref: ${{ steps.meta.outputs.tags }}
                format: 'sarif'
                output: 'trivy-results.sarif'
                severity: 'CRITICAL,HIGH,MEDIUM,LOW'
                exit-code: '0' # Don't fail the build on vulnerabilities, just report the findings.

            - name: Upload Trivy results to GitHub Security tab
              uses: github/codeql-action/upload-sarif@v3
              if: always()
              with:
                sarif_file: 'trivy-results.sarif'

            - name: Sign the container image with cosign
              env:
                DIGEST: ${{ steps.build.outputs.digest }}
                TAGS: ${{ steps.meta.outputs.tags }}
              run: |
                echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

            - name: Generate artifact attestation
              uses: actions/attest-build-provenance@v3
              with:
                subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                subject-digest: ${{ steps.build.outputs.digest }}
                push-to-registry: true

            - name: Clean up old untagged images
              uses: actions/github-script@v8
              with:
                script: |
                    const packageName = context.repo.repo.toLowerCase();
                    const username = context.repo.owner;

                    try {
                        // Get all versions of the package
                        const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                            package_type: 'container',
                            package_name: packageName,
                            username: username,
                            per_page: 100,
                            page: 1
                        });

                        // Filter untagged versions (images without tags)
                        const untaggedVersions = versions.data.filter(version => {
                            return version.metadata.container.tags.length === 0;
                        });

                        console.log(`Found ${untaggedVersions.length} untagged versions`);

                        if (untaggedVersions.length <= 6) {
                            console.log('6 or fewer untagged versions, nothing to delete');
                            return;
                        }

                        // Sort by creation date (newest first)
                        untaggedVersions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                        // Keep the 6 newest, delete the rest
                        const toDelete = untaggedVersions.slice(6);

                        for (const version of toDelete) {
                            console.log(`Deleting version ${version.id} (created: ${version.created_at})`);
                            await github.rest.packages.deletePackageVersionForUser({
                                package_type: 'container',
                                package_name: packageName,
                                username: username,
                                package_version_id: version.id
                            });
                        }

                        console.log(`Deleted ${toDelete.length} old untagged versions`);
                    } catch (error) {
                        console.log(`Cleanup failed: ${error.message}`);
                        // Don't fail the workflow if cleanup fails
                    }

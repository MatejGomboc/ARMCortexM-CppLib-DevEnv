name: Continuous Deployment Of Main Branch

on:
    push:
        branches: [main] # Run only on main branch push event.
    workflow_dispatch: # Manual trigger option.
    schedule:
        - cron: '0 0 * * 6' # Automatic trigger on every Saturday 00:00 AM UTC.

# Prevent concurrent runs
concurrency:
  group: cd-main-branch
  cancel-in-progress: false

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    deploy_main_branch:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write
            security-events: write
            actions: read

        steps:
            - name: Check for concurrent runs
              uses: actions/github-script@v8
              with:
                script: |
                  const currentRunId = context.runId;
                  const workflowId = context.workflow;

                  // Get all in-progress runs for this workflow
                  const runs = await github.rest.actions.listWorkflowRuns({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: '.github/workflows/cd_main_branch.yml',
                    status: 'in_progress',
                    per_page: 10
                  });

                  // Filter out current run and check if any others are running
                  const otherRuns = runs.data.workflow_runs.filter(run => run.id !== currentRunId);

                  if (otherRuns.length > 0) {
                    console.log('❌ Another deployment is already in progress!');
                    console.log(`\nCurrently running:`);
                    otherRuns.forEach(run => {
                      console.log(`  - Run #${run.run_number} (ID: ${run.id})`);
                      console.log(`    Started: ${run.created_at}`);
                      console.log(`    Triggered by: ${run.triggering_actor.login}`);
                      console.log(`    URL: ${run.html_url}`);
                    });
                    console.log('\n💡 Please wait for the current deployment to finish and try again later.');
                    core.setFailed('Deployment blocked: another run is already in progress');
                    return;
                  }

                  console.log('✅ No concurrent runs detected, proceeding with deployment');

            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Lint Dockerfile
              uses: hadolint/hadolint-action@v3.3.0
              with:
                dockerfile: Dockerfile

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Install cosign
              uses: sigstore/cosign-installer@v4.0.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                registry: ${{ env.REGISTRY }}
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                tags: |
                    # Always set 'latest' tag (this workflow only runs from main)
                    type=raw,value=latest

            - name: Build and push Docker image
              id: build
              uses: docker/build-push-action@v6
              with:
                context: .
                platforms: linux/amd64
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
                cache-from: type=gha
                cache-to: type=gha,mode=max
                provenance: false # Disabled implicit provenance.

            - name: Run Trivy vulnerability scanner (table output)
              uses: aquasecurity/trivy-action@0.33.1
              with:
                image-ref: ${{ steps.meta.outputs.tags }}
                format: 'table'
                severity: 'CRITICAL,HIGH,MEDIUM,LOW'
                exit-code: '0' # Don't fail the build on vulnerabilities, just report the findings.

            - name: Run Trivy vulnerability scanner (SARIF output)
              uses: aquasecurity/trivy-action@0.33.1
              with:
                image-ref: ${{ steps.meta.outputs.tags }}
                format: 'sarif'
                output: 'trivy-results.sarif'
                severity: 'CRITICAL,HIGH,MEDIUM,LOW'
                exit-code: '0' # Don't fail the build on vulnerabilities, just report the findings.

            - name: Upload Trivy results to GitHub Security tab
              uses: github/codeql-action/upload-sarif@v4
              if: always()
              with:
                sarif_file: 'trivy-results.sarif'

            - name: Sign the container image with cosign
              env:
                DIGEST: ${{ steps.build.outputs.digest }}
                TAGS: ${{ steps.meta.outputs.tags }}
              run: |
                echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

            - name: Generate artifact attestation
              uses: actions/attest-build-provenance@v3
              with:
                subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                subject-digest: ${{ steps.build.outputs.digest }}
                push-to-registry: true

            - name: Clean up old untagged images
              uses: actions/github-script@v8
              with:
                script: |
                  const packageName = context.repo.repo.toLowerCase();
                  const username = context.repo.owner;

                  const BUNDLE_SIZE = 5; // Each deployment: 1 Docker image + 4 artifacts

                  try {
                      const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                          package_type: 'container',
                          package_name: packageName,
                          username: username,
                          per_page: 100,
                          page: 1
                      });

                      // Sort by creation date (newest first)
                      const allVersions = versions.data.sort((a, b) =>
                          new Date(b.created_at) - new Date(a.created_at)
                      );

                      console.log(`Found ${allVersions.length} total versions`);

                      // STRICT CHECK: Total versions must be divisible by 5
                      if (allVersions.length % BUNDLE_SIZE !== 0) {
                          console.log(`\n❌ ERROR: Total versions (${allVersions.length}) is not divisible by ${BUNDLE_SIZE}!`);
                          console.log('All bundles must be complete. Aborting cleanup.\n');
                          console.log('Current versions in registry:');
                          allVersions.forEach((v, idx) => {
                              const tags = v.metadata.container.tags;
                              const tagInfo = tags.length > 0 ? `[TAGGED: ${tags.join(', ')}]` : '[untagged]';
                              console.log(`  ${idx + 1}. ID: ${v.id} | Created: ${v.created_at} | ${tagInfo}`);
                          });
                          core.setFailed('Cleanup aborted: incomplete bundles detected');
                          return;
                      }

                      // Group into bundles of 5
                      const bundles = [];
                      for (let i = 0; i < allVersions.length; i += BUNDLE_SIZE) {
                          bundles.push(allVersions.slice(i, i + BUNDLE_SIZE));
                      }

                      console.log(`Grouped into ${bundles.length} complete bundles of ${BUNDLE_SIZE}`);

                      if (bundles.length === 0) {
                          console.log('No bundles found, nothing to clean up');
                          return;
                      }

                      // Helper function to check if a tag is a semantic version tag (not SHA digest)
                      const hasSemanticTag = (tags) => {
                          return tags.some(tag => !tag.startsWith('sha256-') && !tag.startsWith('sha256:'));
                      };

                      // SAFETY CHECK: Verify the newest bundle has a Docker image with semantic tag
                      const newestBundle = bundles[0];
                      const newestDockerImage = newestBundle[newestBundle.length - 1];
                      const newestTags = newestDockerImage.metadata.container.tags;

                      if (newestTags.length === 0 || !hasSemanticTag(newestTags)) {
                          console.log('❌ ERROR: Newest bundle Docker image does not have a semantic tag!');
                          console.log('Expected the current deployment to be tagged with "latest" or version tag.\n');
                          console.log('Details of newest bundle:');
                          newestBundle.forEach((v, idx) => {
                              const tags = v.metadata.container.tags;
                              const tagInfo = tags.length > 0 ? `[TAGGED: ${tags.join(', ')}]` : '[untagged]';
                              const position = idx === newestBundle.length - 1 ? ' (Docker image)' : ' (artifact)';
                              console.log(`  Position ${idx}: ID ${v.id} | Created: ${v.created_at} | ${tagInfo}${position}`);
                          });
                          core.setFailed('Cleanup aborted: newest bundle has invalid tag structure');
                          return;
                      }

                      const semanticTags = newestTags.filter(tag => !tag.startsWith('sha256-') && !tag.startsWith('sha256:'));
                      console.log(`✅ Safety check passed: Newest bundle Docker image tagged as "${semanticTags.join(', ')}"\n`);

                      let deletedBundles = 0;
                      let deletedArtifacts = 0;

                      for (let i = 0; i < bundles.length; i++) {
                          const bundle = bundles[i];

                          // The oldest in bundle is the Docker image
                          const dockerImage = bundle[bundle.length - 1];
                          const tags = dockerImage.metadata.container.tags;

                          // Check if Docker image has a semantic tag (not just SHA digest)
                          if (tags.length === 0 || !hasSemanticTag(tags)) {
                              // No semantic tag = superseded "latest" → DELETE entire bundle
                              const tagInfo = tags.length > 0 ? `only SHA tags: ${tags.join(', ')}` : 'untagged';
                              console.log(`Bundle ${i + 1}: Docker image ${tagInfo} → DELETING`);

                              for (const version of bundle) {
                                  console.log(`  - ${version.id} (${version.created_at})`);
                                  await github.rest.packages.deletePackageVersionForUser({
                                      package_type: 'container',
                                      package_name: packageName,
                                      username: username,
                                      package_version_id: version.id
                                  });
                                  deletedArtifacts++;
                              }
                              deletedBundles++;
                          } else {
                              // Has semantic tag (latest, v*.*.*)  → KEEP entire bundle
                              const semanticTags = tags.filter(tag => !tag.startsWith('sha256-') && !tag.startsWith('sha256:'));
                              console.log(`Bundle ${i + 1}: Docker image tagged "${semanticTags.join(', ')}" → KEEPING`);
                          }
                      }

                      console.log(`\n✅ Deleted ${deletedBundles} bundles (${deletedArtifacts} artifacts)`);

                  } catch (error) {
                      console.log(`⚠️ Cleanup failed: ${error.message}`);
                      core.setFailed(`Cleanup failed: ${error.message}`);
                  }

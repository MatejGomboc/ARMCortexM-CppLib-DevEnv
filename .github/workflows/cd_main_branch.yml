name: Continuous Deployment Of Main Branch

on:
    push:
        branches: [main] # Run only on main branch push event.
    workflow_dispatch: # Manual trigger option.
    schedule:
        - cron: '0 0 * * 6' # Automatic trigger on every Saturday 00:00 AM UTC.

# Prevent concurrent runs across ALL deployment workflows.
concurrency:
  group: deployment-pipeline
  cancel-in-progress: false

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    deploy_main_branch:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write
            security-events: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                ref: ${{ github.ref }}

            - name: Lint Dockerfile
              uses: hadolint/hadolint-action@v3.3.0
              with:
                dockerfile: Dockerfile
                failure-threshold: error

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Install cosign
              uses: sigstore/cosign-installer@v4.0.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                registry: ${{ env.REGISTRY }}
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                tags: |
                    # Always set 'latest' tag (this workflow only runs from main).
                    type=raw,value=latest

            - name: Build and push Docker image
              id: build
              uses: docker/build-push-action@v6
              with:
                context: .
                platforms: linux/amd64
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
                cache-from: type=gha
                cache-to: type=gha,mode=max
                provenance: false # Disabled implicit provenance.

            - name: Verify image was pushed to registry
              env:
                IMAGE_REF: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
              run: |
                set -euo pipefail
                echo "Verifying image exists in registry: ${IMAGE_REF}"
                docker manifest inspect "${IMAGE_REF}"
                echo "✅ Image successfully pushed and verified"

            - name: Run Trivy vulnerability scanner (table output)
              uses: aquasecurity/trivy-action@0.33.1
              with:
                image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
                format: 'table'
                severity: 'CRITICAL,HIGH,MEDIUM,LOW'
                exit-code: '0' # Don't fail the build on vulnerabilities, just report the findings.

            - name: Run Trivy vulnerability scanner (SARIF output)
              uses: aquasecurity/trivy-action@0.33.1
              with:
                image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
                format: 'sarif'
                output: 'trivy-results.sarif'
                severity: 'CRITICAL,HIGH,MEDIUM,LOW'
                exit-code: '0' # Don't fail the build on vulnerabilities, just report the findings.

            - name: Upload Trivy results to GitHub Security tab
              uses: github/codeql-action/upload-sarif@v4
              if: always()
              with:
                sarif_file: 'trivy-results.sarif'

            - name: Sign the container image with cosign
              env:
                DIGEST: ${{ steps.build.outputs.digest }}
                IMAGE_REF: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
              run: |
                set -euo pipefail
                # Extract image name without tag, then sign by digest
                IMAGE_BASE="${IMAGE_REF%:*}"
                cosign sign --yes "${IMAGE_BASE}@${DIGEST}"
                echo "✅ Image signed successfully"

            - name: Generate artifact attestation
              uses: actions/attest-build-provenance@v3
              with:
                subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                subject-digest: ${{ steps.build.outputs.digest }}
                push-to-registry: true

    # Call the cleanup workflow after successful deployment.
    cleanup_old_images:
        needs: deploy_main_branch
        concurrency:
            group: cleanup-pipeline
            cancel-in-progress: false
        permissions:
            contents: read
            packages: write
            attestations: write
            actions: write
        uses: ./.github/workflows/cleanup_old_images.yml
        with:
            package_name: ${{ github.event.repository.name }}
            username: ${{ github.repository_owner }}
            bundle_size: 5
            keep_semantic_tagged: true
        secrets: inherit

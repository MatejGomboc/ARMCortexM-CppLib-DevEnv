name: Continuous Deployment Of Main Branch

on:
    push:
        branches: [main] # Run only on main branch push event.
    workflow_dispatch: # Manual trigger option.
    schedule:
        - cron: '0 0 * * 6' # Automatic trigger on every Saturday 00:00 AM UTC.

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    deploy_main_branch:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write
            security-events: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Lint Dockerfile
              uses: hadolint/hadolint-action@v3.3.0
              with:
                dockerfile: Dockerfile

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Install cosign
              uses: sigstore/cosign-installer@v3.7.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                registry: ${{ env.REGISTRY }}
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                tags: |
                    # Always set 'latest' tag (this workflow only runs from main)
                    type=raw,value=latest

            - name: Build and push Docker image
              id: build
              uses: docker/build-push-action@v6
              with:
                context: .
                platforms: linux/amd64
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
                cache-from: type=gha
                cache-to: type=gha,mode=max

            - name: Run Trivy vulnerability scanner (table output)
              uses: aquasecurity/trivy-action@0.28.0
              with:
                image-ref: ${{ steps.meta.outputs.tags }}
                format: 'table'
                severity: 'CRITICAL,HIGH,MEDIUM,LOW'
                exit-code: '0' # Don't fail the build on vulnerabilities, just report the findings.

            - name: Run Trivy vulnerability scanner (SARIF output)
              uses: aquasecurity/trivy-action@0.28.0
              with:
                image-ref: ${{ steps.meta.outputs.tags }}
                format: 'sarif'
                output: 'trivy-results.sarif'
                severity: 'CRITICAL,HIGH,MEDIUM,LOW'
                exit-code: '0' # Don't fail the build on vulnerabilities, just report the findings.

            - name: Upload Trivy results to GitHub Security tab
              uses: github/codeql-action/upload-sarif@v3
              if: always()
              with:
                sarif_file: 'trivy-results.sarif'

            - name: Sign the container image with cosign
              env:
                DIGEST: ${{ steps.build.outputs.digest }}
                TAGS: ${{ steps.meta.outputs.tags }}
              run: |
                echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

            - name: Generate artifact attestation
              uses: actions/attest-build-provenance@v3
              with:
                subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                subject-digest: ${{ steps.build.outputs.digest }}
                push-to-registry: true

            - name: Clean up old untagged images
              uses: actions/github-script@v7
              with:
                script: |
                    const packageName = context.repo.repo.toLowerCase();
                    const username = context.repo.owner;

                    try {
                        // Get all versions of the package
                        const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                            package_type: 'container',
                            package_name: packageName,
                            username: username,
                            per_page: 100,
                            page: 1
                        });

                        // Separate tagged and untagged versions
                        const taggedVersions = versions.data.filter(version => 
                            version.metadata.container.tags.length > 0
                        );
                        
                        const untaggedVersions = versions.data.filter(version => 
                            version.metadata.container.tags.length === 0
                        );

                        console.log(`Found ${taggedVersions.length} tagged versions`);
                        console.log(`Found ${untaggedVersions.length} untagged versions`);

                        if (untaggedVersions.length === 0) {
                            console.log('No untagged versions found');
                            return;
                        }

                        // Function to check if tags include a semantic version (not just 'latest')
                        const hasSemanticVersion = (tags) => {
                            return tags.some(tag => tag.match(/^v?\d+(\.\d+)*$/));
                        };

                        // Group untagged artifacts with their tagged versions
                        // Artifacts are created within ~5 minutes of the tagged image
                        const timeWindowMs = 5 * 60 * 1000; // 5 minutes
                        const retentionDays = 30;
                        const cutoffDate = new Date();
                        cutoffDate.setDate(cutoffDate.getDate() - retentionDays);
                        
                        const artifactsToKeep = new Set();
                        
                        console.log(`\nAnalyzing bundles (tagged images + their artifacts):`);
                        console.log(`Retention policy: Keep 'latest' bundles from last ${retentionDays} days, keep ALL versioned tag bundles forever\n`);
                        
                        for (const tagged of taggedVersions) {
                            const taggedDate = new Date(tagged.created_at);
                            const hasVersionTag = hasSemanticVersion(tagged.metadata.container.tags);
                            const hasLatestTag = tagged.metadata.container.tags.includes('latest');
                            const tags = tagged.metadata.container.tags.join(', ');
                            
                            console.log(`Bundle: [${tags}] (created: ${tagged.created_at})`);
                            
                            // Find untagged artifacts created around the same time (same bundle)
                            const bundleArtifacts = untaggedVersions.filter(untagged => {
                                const untaggedDate = new Date(untagged.created_at);
                                const timeDiff = Math.abs(untaggedDate - taggedDate);
                                return timeDiff <= timeWindowMs;
                            });
                            
                            console.log(`  -> Found ${bundleArtifacts.length} artifacts in this bundle`);
                            
                            // Decide whether to keep this bundle
                            let keepBundle = false;
                            let reason = '';
                            
                            if (hasVersionTag) {
                                // Semantic version tags: ALWAYS keep their artifacts forever
                                keepBundle = true;
                                reason = 'versioned release (kept forever)';
                            } else if (hasLatestTag) {
                                // Latest tag: check age
                                if (taggedDate >= cutoffDate) {
                                    keepBundle = true;
                                    const ageInDays = Math.floor((Date.now() - taggedDate.getTime()) / (1000 * 60 * 60 * 24));
                                    reason = `'latest' bundle within retention (${ageInDays} days old)`;
                                } else {
                                    keepBundle = false;
                                    const ageInDays = Math.floor((Date.now() - taggedDate.getTime()) / (1000 * 60 * 60 * 24));
                                    reason = `'latest' bundle older than ${retentionDays} days (${ageInDays} days old)`;
                                }
                            }
                            
                            if (keepBundle) {
                                console.log(`  ✅ KEEPING: ${reason}`);
                                bundleArtifacts.forEach(artifact => artifactsToKeep.add(artifact.id));
                            } else {
                                console.log(`  ❌ ELIGIBLE FOR DELETION: ${reason}`);
                            }
                        }
                        
                        // Delete untagged versions not in the keep set
                        const toDelete = untaggedVersions.filter(version => !artifactsToKeep.has(version.id));
                        
                        console.log(`\n========================================`);
                        console.log(`Summary:`);
                        console.log(`  - Total untagged artifacts: ${untaggedVersions.length}`);
                        console.log(`  - Artifacts to keep: ${artifactsToKeep.size}`);
                        console.log(`  - Artifacts to delete: ${toDelete.length}`);
                        console.log(`========================================\n`);
                        
                        if (toDelete.length === 0) {
                            console.log('✅ No artifacts to delete');
                            return;
                        }
                        
                        console.log(`Deleting ${toDelete.length} artifacts:\n`);
                        
                        for (const version of toDelete) {
                            const ageInDays = Math.floor((Date.now() - new Date(version.created_at).getTime()) / (1000 * 60 * 60 * 24));
                            console.log(`  Deleting artifact ${version.id} (created: ${version.created_at}, age: ${ageInDays} days)`);
                            
                            await github.rest.packages.deletePackageVersionForUser({
                                package_type: 'container',
                                package_name: packageName,
                                username: username,
                                package_version_id: version.id
                            });
                        }
                        
                        console.log(`\n✅ Successfully deleted ${toDelete.length} old artifacts`);
                    } catch (error) {
                        console.log(`❌ Cleanup failed: ${error.message}`);
                        console.error(error);
                        // Don't fail the workflow if cleanup fails
                    }

name: Deployment Of A Release Tag

on:
    push:
        tags: ["v*.*.*"] # Run only on release of a properly named tag.

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    deploy_release_tag:
        runs-on: ubuntu-latest

        permissions:
            contents: read
            packages: write
            id-token: write
            attestations: write
            security-events: write

        steps:
            - name: Validate tag's name format
              run: |
                TAG="${{ github.ref_name }}"
                
                # Strict validation: must be v{major}.{minor}.{patch} where all are non-negative integers
                if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                    echo "❌ Error: Tag '$TAG' does not match required format 'v{major}.{minor}.{patch}'"
                    echo ""
                    echo "Required format:"
                    echo "  - Must start with lowercase 'v'"
                    echo "  - Followed by three non-negative integers separated by dots"
                    echo "  - No leading zeros in version numbers (except '0' itself)"
                    echo "  - No pre-release or build metadata suffixes"
                    echo ""
                    echo "✅ Valid examples: v0.0.1, v1.0.0, v2.3.1, v10.15.4"
                    echo "❌ Invalid examples: V1.0.0, v1.0, v1.0.0-alpha, v01.0.0, v1.0.0+build"
                    exit 1
                fi
                
                # Extract version components
                MAJOR="${BASH_REMATCH[1]}"
                MINOR="${BASH_REMATCH[2]}"
                PATCH="${BASH_REMATCH[3]}"
                
                # Check for leading zeros (except for '0' itself)
                if [[ "$MAJOR" =~ ^0[0-9]+ ]] || [[ "$MINOR" =~ ^0[0-9]+ ]] || [[ "$PATCH" =~ ^0[0-9]+ ]]; then
                    echo "❌ Error: Version numbers must not have leading zeros"
                    echo "Tag: $TAG"
                    echo "Major: $MAJOR, Minor: $MINOR, Patch: $PATCH"
                    exit 1
                fi
                
                echo "✅ Tag format validated successfully: $TAG"
                echo "   Major: $MAJOR"
                echo "   Minor: $MINOR"
                echo "   Patch: $PATCH"

            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Lint Dockerfile
              uses: hadolint/hadolint-action@v3.3.0
              with:
                dockerfile: Dockerfile

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Install cosign
              uses: sigstore/cosign-installer@v3.7.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                registry: ${{ env.REGISTRY }}
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                tags: |
                    # Semantic versioning tags
                    type=semver,pattern={{version}}
                    type=semver,pattern={{major}}.{{minor}}
                    type=semver,pattern={{major}}

            - name: Build and push Docker image
              id: build
              uses: docker/build-push-action@v6
              with:
                context: .
                platforms: linux/amd64
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
                cache-from: type=gha
                cache-to: type=gha,mode=max

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@0.28.0
              with:
                image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
                format: 'sarif'
                output: 'trivy-results.sarif'
                severity: 'CRITICAL,HIGH'

            - name: Upload Trivy results to GitHub Security tab
              uses: github/codeql-action/upload-sarif@v3
              if: always()
              with:
                sarif_file: 'trivy-results.sarif'

            - name: Sign the container images with cosign
              env:
                DIGEST: ${{ steps.build.outputs.digest }}
                TAGS: ${{ steps.meta.outputs.tags }}
              run: |
                echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

            - name: Generate artifact attestation
              uses: actions/attest-build-provenance@v3
              with:
                subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                subject-digest: ${{ steps.build.outputs.digest }}
                push-to-registry: true

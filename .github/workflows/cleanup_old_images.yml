name: Cleanup Old Container Images, Attestations, and Caches

on:
    workflow_call:
        inputs:
            package_name:
                description: 'Name of the container package to clean'
                required: true
                type: string
            username:
                description: 'GitHub username/org that owns the package'
                required: true
                type: string
            bundle_size:
                description: 'Number of artifacts per bundle (default: 5)'
                required: false
                type: number
                default: 5
            keep_semantic_tagged:
                description: 'Keep bundles with semantic version tags (default: true)'
                required: false
                type: boolean
                default: true
            cleanup_attestations:
                description: 'Clean up attestations for deleted images (default: true)'
                required: false
                type: boolean
                default: true
            cleanup_caches:
                description: 'Clean up old GitHub Actions caches (default: true)'
                required: false
                type: boolean
                default: true
            cache_retention_days:
                description: 'Keep caches newer than this many days (default: 7)'
                required: false
                type: number
                default: 7
            dry_run:
                description: 'Perform dry-run without actual deletion (default: false)'
                required: false
                type: boolean
                default: false

jobs:
    cleanup:
        runs-on: ubuntu-latest

        permissions:
            packages: write
            contents: read
            attestations: write
            actions: write

        steps:
            - name: Clean up old container images, attestations, and caches
              uses: actions/github-script@v8
              with:
                script: |
                  // ============================================================
                  // NORMALIZE INPUT PARAMETERS
                  // ============================================================
                  // Docker normalizes container image names to lowercase, but GitHub
                  // repository names can have mixed case (e.g., "MatejGomboc/ARMCortexM-CppLib-DevEnv").
                  // While the GitHub Packages API appears to be case-insensitive, this is
                  // undocumented behavior. We normalize to lowercase here for consistency
                  // with Docker conventions and to prevent potential issues if API behavior changes.
                  const packageName = '${{ inputs.package_name }}'.toLowerCase();
                  const username = '${{ inputs.username }}'.toLowerCase();
                  
                  const BUNDLE_SIZE = ${{ inputs.bundle_size }};
                  const KEEP_SEMANTIC_TAGGED = ${{ inputs.keep_semantic_tagged }};
                  const CLEANUP_ATTESTATIONS = ${{ inputs.cleanup_attestations }};
                  const CLEANUP_CACHES = ${{ inputs.cleanup_caches }};
                  const CACHE_RETENTION_DAYS = ${{ inputs.cache_retention_days }};
                  const DRY_RUN = ${{ inputs.dry_run }};

                  console.log(`Normalized package name: ${packageName}`);
                  console.log(`Normalized username: ${username}\n`);

                  try {
                      // Initialize tracking variables at function scope
                      let deletedBundles = 0;
                      let deletedArtifacts = 0;
                      const deletedImageDigests = [];
                      let deletedCaches = 0;
                      let totalCacheSize = 0;

                      // ============================================================
                      // DRY RUN MODE INDICATOR
                      // ============================================================
                      
                      if (DRY_RUN) {
                          console.log('🔍'.repeat(30));
                          console.log('🔍 DRY RUN MODE - NO ACTUAL DELETIONS WILL OCCUR 🔍');
                          console.log('🔍'.repeat(30));
                          console.log('');
                      }

                      // ============================================================
                      // PHASE 1: CLEAN UP DOCKER IMAGES
                      // ============================================================
                      
                      console.log('='.repeat(60));
                      console.log('PHASE 1: CLEANING UP DOCKER IMAGES');
                      console.log('='.repeat(60));
                      console.log('');

                      // Fetch ALL package versions with pagination.
                      // This ensures we don't miss old bundles if previous cleanup failed.
                      let allVersions = [];
                      let page = 1;
                      let hasMore = true;

                      console.log('Fetching all package versions...');

                      while (hasMore) {
                          const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                              package_type: 'container',
                              package_name: packageName,
                              username: username,
                              per_page: 100,  // Maximum allowed per page
                              page: page
                          });

                          allVersions = allVersions.concat(versions.data);
                          hasMore = versions.data.length === 100;  // Check if there might be more pages
                          
                          console.log(`  Page ${page}: fetched ${versions.data.length} versions`);
                          
                          page++;

                          // Safety limit to prevent infinite loops (max 1000 versions)
                          if (page > 10) {
                              console.log('⚠️ Reached safety limit of 10 pages (1000 versions)');
                              break;
                          }
                      }

                      // Sort by creation date (newest first).
                      allVersions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                      console.log(`\nFetched ${allVersions.length} total versions`);

                      if (allVersions.length === 0) {
                          console.log('No versions found, nothing to clean up');
                          return;
                      }

                      // ============================================================
                      // ROBUST BUNDLE IDENTIFICATION
                      // ============================================================
                      // Instead of requiring perfect divisibility, we:
                      // 1. Find bundle boundaries using semantic tags (latest, v*.*.*)
                      // 2. These tags are always at position 4 (oldest in bundle)
                      // 3. Build bundles by collecting the 4 newer artifacts before each marker
                      // 4. Look for deprecated bundles (superseded "latest" with no tags)
                      // 5. Clean up any incomplete/broken bundles and true orphans
                      // 6. Keep only complete, healthy bundles

                      // Helper function to check if tags contain only SHA256 digests.
                      const hasOnlySHATags = (tags) => {
                          return tags.length > 0 && tags.every(tag => tag.startsWith('sha256-') || tag.startsWith('sha256:'));
                      };

                      // Helper function to check if tags contain semantic version tags.
                      const hasSemanticTag = (tags) => {
                          return tags.some(tag => !tag.startsWith('sha256-') && !tag.startsWith('sha256:'));
                      };

                      console.log('\nIdentifying bundles using semantic tag markers...');

                      // Find all bundle markers (versions with semantic tags)
                      const bundleMarkers = [];
                      for (let i = 0; i < allVersions.length; i++) {
                          const version = allVersions[i];
                          if (hasSemanticTag(version.metadata.container.tags)) {
                              bundleMarkers.push({ index: i, version: version });
                          }
                      }

                      console.log(`Found ${bundleMarkers.length} bundle markers (semantic tags)`);

                      // Build bundles around each marker
                      const bundles = [];
                      const orphanedVersions = new Set(allVersions.map((v, i) => i)); // Track all version indices

                      for (const marker of bundleMarkers) {
                          const markerIndex = marker.index;
                          const bundle = {
                              versions: [],
                              markerIndex: markerIndex,
                              isComplete: false,
                              isNewest: false,
                              isDeprecated: false
                          };

                          // Bundle should contain:
                          // - 4 artifacts before the marker (positions 0-3)
                          // - The marker itself at position 4
                          
                          // Collect the 4 versions immediately before the marker
                          const startIndex = markerIndex - (BUNDLE_SIZE - 1);
                          
                          if (startIndex >= 0) {
                              // We have enough versions before the marker
                              for (let i = startIndex; i <= markerIndex; i++) {
                                  bundle.versions.push(allVersions[i]);
                                  orphanedVersions.delete(i);
                              }
                              
                              if (bundle.versions.length === BUNDLE_SIZE) {
                                  bundle.isComplete = true;
                              }
                          } else {
                              // Not enough versions before marker - incomplete bundle
                              // Collect whatever we have
                              for (let i = 0; i <= markerIndex; i++) {
                                  bundle.versions.push(allVersions[i]);
                                  orphanedVersions.delete(i);
                              }
                          }

                          bundles.push(bundle);
                      }

                      // Mark the newest complete bundle
                      for (const bundle of bundles) {
                          if (bundle.isComplete) {
                              bundle.isNewest = true;
                              break; // Only the first complete bundle is newest
                          }
                      }

                      console.log(`Built ${bundles.length} bundles from markers`);
                      console.log(`Found ${orphanedVersions.size} orphaned versions (not part of any bundle)\n`);

                      // ============================================================
                      // IDENTIFY DEPRECATED BUNDLES (SUPERSEDED "LATEST")
                      // ============================================================
                      // Deprecated bundles are complete 5-version bundles that lost their
                      // "latest" tag when superseded. They have no semantic tags but still
                      // maintain the bundle structure. We identify them by:
                      // 1. Looking for groups of exactly 5 consecutive orphaned versions
                      // 2. Validating they have proper bundle structure
                      // 3. Position 4 should have no semantic tag (lost "latest")

                      if (orphanedVersions.size >= BUNDLE_SIZE) {
                          console.log('Checking for deprecated bundles among orphaned versions...');
                          
                          // Convert to sorted array for easier scanning
                          const orphanedIndices = Array.from(orphanedVersions).sort((a, b) => a - b);
                          let deprecatedCount = 0;
                          
                          // Look for consecutive groups of exactly BUNDLE_SIZE versions
                          for (let i = 0; i <= orphanedIndices.length - BUNDLE_SIZE; i++) {
                              // Check if we have BUNDLE_SIZE consecutive indices
                              let isConsecutive = true;
                              for (let j = 0; j < BUNDLE_SIZE - 1; j++) {
                                  if (orphanedIndices[i + j + 1] !== orphanedIndices[i + j] + 1) {
                                      isConsecutive = false;
                                      break;
                                  }
                              }
                              
                              if (isConsecutive) {
                                  // Found a potential deprecated bundle
                                  const potentialBundle = {
                                      versions: [],
                                      markerIndex: orphanedIndices[i + BUNDLE_SIZE - 1],
                                      isComplete: true,
                                      isNewest: false,
                                      isDeprecated: true
                                  };
                                  
                                  for (let j = 0; j < BUNDLE_SIZE; j++) {
                                      const idx = orphanedIndices[i + j];
                                      potentialBundle.versions.push(allVersions[idx]);
                                  }
                                  
                                  // Validate bundle structure
                                  const pos0 = potentialBundle.versions[0];
                                  const pos4 = potentialBundle.versions[4];
                                  
                                  // Position 0 should have SHA256 tag only (attestation)
                                  // Position 4 should have no semantic tag (superseded Docker image)
                                  if (hasOnlySHATags(pos0.metadata.container.tags) && 
                                      !hasSemanticTag(pos4.metadata.container.tags)) {
                                      
                                      // Valid deprecated bundle - remove from orphaned set
                                      for (let j = 0; j < BUNDLE_SIZE; j++) {
                                          orphanedVersions.delete(orphanedIndices[i + j]);
                                      }
                                      
                                      bundles.push(potentialBundle);
                                      deprecatedCount++;
                                      console.log(`  Found deprecated bundle at indices ${orphanedIndices[i]}-${orphanedIndices[i + BUNDLE_SIZE - 1]}`);
                                      
                                      // Skip ahead since we've consumed these indices
                                      i += BUNDLE_SIZE - 1;
                                  }
                              }
                          }
                          
                          console.log(`Found ${deprecatedCount} deprecated bundles (superseded "latest")`);
                          console.log(`Remaining orphaned versions: ${orphanedVersions.size}\n`);
                      }

                      // ============================================================
                      // VALIDATE AND PROCESS BUNDLES
                      // ============================================================

                      for (let i = 0; i < bundles.length; i++) {
                          const bundle = bundles[i];
                          const bundleNum = i + 1;

                          console.log(`\nBundle ${bundleNum}:`);
                          console.log(`  Complete: ${bundle.isComplete}`);
                          console.log(`  Newest: ${bundle.isNewest}`);
                          console.log(`  Deprecated: ${bundle.isDeprecated}`);
                          console.log(`  Size: ${bundle.versions.length}/${BUNDLE_SIZE}`);

                          // Log bundle contents
                          bundle.versions.forEach((v, idx) => {
                              const tags = v.metadata.container.tags;
                              const tagInfo = tags.length > 0 ? `[${tags.join(', ')}]` : '[untagged]';
                              console.log(`    Position ${idx}: ${tagInfo}`);
                          });

                          // Determine if bundle should be deleted
                          let shouldDelete = false;
                          let deleteReason = '';

                          if (!bundle.isComplete) {
                              // Incomplete bundle - always delete
                              shouldDelete = true;
                              deleteReason = 'incomplete bundle (broken/partial deployment)';
                          } else if (bundle.isDeprecated) {
                              // Deprecated bundle (superseded "latest") - always delete
                              shouldDelete = true;
                              deleteReason = 'deprecated (superseded "latest" - no semantic tag)';
                          } else {
                              // Complete bundle with semantic tag - check retention policy
                              const dockerImage = bundle.versions[BUNDLE_SIZE - 1];
                              const tags = dockerImage.metadata.container.tags;

                              if (!KEEP_SEMANTIC_TAGGED && !bundle.isNewest) {
                                  // Has semantic tag but we're not keeping old versions → DELETE
                                  shouldDelete = true;
                                  deleteReason = 'old versioned release (keep_semantic_tagged=false)';
                              } else {
                                  // Keep this bundle
                                  const semanticTags = tags.filter(tag => !tag.startsWith('sha256-') && !tag.startsWith('sha256:'));
                                  console.log(`  → KEEPING (tagged: ${semanticTags.join(', ')})`);
                              }
                          }

                          if (shouldDelete) {
                              console.log(`  → ${DRY_RUN ? 'WOULD DELETE' : 'DELETING'} (${deleteReason})`);

                              // Collect Docker image digest for attestation cleanup (if it exists and has digest)
                              if (bundle.versions.length === BUNDLE_SIZE) {
                                  const dockerImage = bundle.versions[BUNDLE_SIZE - 1];
                                  const dockerImageDigest = dockerImage.name;
                                  if (dockerImageDigest && dockerImageDigest.startsWith('sha256:')) {
                                      deletedImageDigests.push(dockerImageDigest);
                                      console.log(`    Collected digest for attestation cleanup: ${dockerImageDigest.substring(0, 20)}...`);
                                  }
                              }

                              // Delete all versions in the bundle
                              for (const version of bundle.versions) {
                                  if (!DRY_RUN) {
                                      await github.rest.packages.deletePackageVersionForUser({
                                          package_type: 'container',
                                          package_name: packageName,
                                          username: username,
                                          package_version_id: version.id
                                      });
                                  }
                                  deletedArtifacts++;
                              }
                              deletedBundles++;
                          }
                      }

                      // ============================================================
                      // HANDLE TRUE ORPHANED VERSIONS
                      // ============================================================

                      if (orphanedVersions.size > 0) {
                          console.log(`\n⚠️  Found ${orphanedVersions.size} truly orphaned versions (broken artifacts)`);
                          console.log(`${DRY_RUN ? 'Would delete' : 'Deleting'} orphaned versions to clean up broken state:\n`);

                          for (const idx of orphanedVersions) {
                              const version = allVersions[idx];
                              const tags = version.metadata.container.tags;
                              const tagInfo = tags.length > 0 ? `[${tags.join(', ')}]` : '[untagged]';
                              console.log(`  - Orphaned version: ${tagInfo} (created: ${version.created_at})`);

                              if (!DRY_RUN) {
                                  await github.rest.packages.deletePackageVersionForUser({
                                      package_type: 'container',
                                      package_name: packageName,
                                      username: username,
                                      package_version_id: version.id
                                  });
                              }
                              deletedArtifacts++;
                          }
                      }

                      const deprecatedBundleCount = bundles.filter(b => b.isDeprecated && b.isComplete).length;
                      console.log(`\n✅ ${DRY_RUN ? 'Would delete' : 'Deleted'} ${deletedBundles} bundles (including ${deprecatedBundleCount} deprecated) + ${orphanedVersions.size} orphaned (${deletedArtifacts} total artifacts)`);
                      console.log(`Collected ${deletedImageDigests.length} image digests for attestation cleanup\n`);

                      // ============================================================
                      // PHASE 2: CLEAN UP ATTESTATIONS
                      // ============================================================
                      
                      if (CLEANUP_ATTESTATIONS && deletedImageDigests.length > 0) {
                          console.log('='.repeat(60));
                          console.log('PHASE 2: CLEANING UP ATTESTATIONS');
                          console.log('='.repeat(60));
                          console.log('');
                          
                          console.log(`Found ${deletedImageDigests.length} deleted Docker image digests`);
                          console.log(`${DRY_RUN ? 'Would clean up' : 'Cleaning up'} associated attestations...\n`);
                          
                          let deletedAttestations = 0;
                          let attestationErrors = 0;

                          for (const digest of deletedImageDigests) {
                              try {
                                  console.log(`${DRY_RUN ? 'Would delete' : 'Deleting'} attestations for image digest: ${digest.substring(0, 20)}...`);
                                  
                                  if (!DRY_RUN) {
                                      // Use the REST API to delete attestations by subject digest
                                      await github.request('DELETE /users/{username}/attestations/digest/{subject_digest}', {
                                          username: username,
                                          subject_digest: digest,
                                          headers: {
                                              'X-GitHub-Api-Version': '2022-11-28'
                                          }
                                      });
                                  }
                                  
                                  deletedAttestations++;
                                  console.log(`  ✅ ${DRY_RUN ? 'Would delete attestations for this image' : 'Deleted attestations for this image'}`);
                              } catch (error) {
                                  // 404 is expected if no attestations exist for this digest
                                  if (error.status === 404) {
                                      console.log(`  ℹ️  No attestations found for this digest`);
                                  } else {
                                      console.log(`  ⚠️  Error deleting attestations: ${error.message}`);
                                      attestationErrors++;
                                  }
                              }
                          }
                          
                          console.log(`\n✅ ${DRY_RUN ? 'Would delete' : 'Deleted'} attestations for ${deletedAttestations} image digests`);
                          if (attestationErrors > 0) {
                              console.log(`⚠️  ${attestationErrors} attestation deletion errors (non-fatal)`);
                          }
                          console.log('');
                      } else if (CLEANUP_ATTESTATIONS) {
                          console.log('ℹ️  No deleted image digests, skipping attestation cleanup\n');
                      }

                      // ============================================================
                      // PHASE 3: CLEAN UP OLD CACHES
                      // ============================================================
                      
                      if (CLEANUP_CACHES) {
                          console.log('='.repeat(60));
                          console.log('PHASE 3: CLEANING UP OLD GITHUB ACTIONS CACHES');
                          console.log('='.repeat(60));
                          console.log('');
                          
                          const cutoffDate = new Date();
                          cutoffDate.setDate(cutoffDate.getDate() - CACHE_RETENTION_DAYS);
                          console.log(`${DRY_RUN ? 'Would delete' : 'Deleting'} caches older than ${CACHE_RETENTION_DAYS} days (before ${cutoffDate.toISOString()})\n`);
                          
                          let cacheErrors = 0;

                          try {
                              // Fetch all caches with pagination
                              let cachePage = 1;
                              let hasMoreCaches = true;
                              
                              while (hasMoreCaches) {
                                  const caches = await github.rest.actions.getActionsCacheList({
                                      owner: context.repo.owner,
                                      repo: context.repo.repo,
                                      per_page: 100,
                                      page: cachePage
                                  });
                                  
                                  console.log(`Fetched ${caches.data.actions_caches.length} caches (page ${cachePage})`);
                                  
                                  for (const cache of caches.data.actions_caches) {
                                      const cacheDate = new Date(cache.created_at);
                                      
                                      if (cacheDate < cutoffDate) {
                                          try {
                                              console.log(`  ${DRY_RUN ? 'Would delete' : 'Deleting'} cache: ${cache.key} (${(cache.size_in_bytes / 1024 / 1024).toFixed(2)} MB, created ${cache.created_at})`);
                                              
                                              if (!DRY_RUN) {
                                                  await github.rest.actions.deleteActionsCacheById({
                                                      owner: context.repo.owner,
                                                      repo: context.repo.repo,
                                                      cache_id: cache.id
                                                  });
                                              }
                                              
                                              deletedCaches++;
                                              totalCacheSize += cache.size_in_bytes;
                                          } catch (error) {
                                              console.log(`    ⚠️  Error deleting cache: ${error.message}`);
                                              cacheErrors++;
                                          }
                                      }
                                  }
                                  
                                  hasMoreCaches = caches.data.actions_caches.length === 100;
                                  cachePage++;
                                  
                                  // Safety limit
                                  if (cachePage > 10) {
                                      console.log('⚠️ Reached safety limit of 10 pages for caches');
                                      break;
                                  }
                              }
                              
                              const totalCacheSizeMB = (totalCacheSize / 1024 / 1024).toFixed(2);
                              console.log(`\n✅ ${DRY_RUN ? 'Would delete' : 'Deleted'} ${deletedCaches} old caches (${DRY_RUN ? 'would free' : 'freed'} ${totalCacheSizeMB} MB)`);
                              if (cacheErrors > 0) {
                                  console.log(`⚠️  ${cacheErrors} cache deletion errors (non-fatal)`);
                              }
                              console.log('');
                              
                          } catch (error) {
                              console.log(`⚠️ Cache cleanup failed: ${error.message}`);
                              console.log('Continuing with workflow (cache cleanup is non-fatal)\n');
                          }
                      }

                      // ============================================================
                      // CLEANUP SUMMARY
                      // ============================================================
                      
                      console.log('='.repeat(60));
                      console.log('CLEANUP SUMMARY');
                      if (DRY_RUN) {
                          console.log('(DRY RUN - NO ACTUAL DELETIONS PERFORMED)');
                      }
                      console.log('='.repeat(60));
                      
                      const deprecatedCount = bundles.filter(b => b.isDeprecated && b.isComplete).length;
                      console.log(`Docker Images:  ${DRY_RUN ? 'Would delete' : 'Deleted'} ${deletedBundles} bundles (${deprecatedCount} deprecated) + ${orphanedVersions.size} orphaned (${deletedArtifacts} total artifacts)`);
                      
                      if (CLEANUP_ATTESTATIONS) {
                          console.log(`Attestations:   ${DRY_RUN ? 'Would clean up' : 'Cleaned up'} for ${deletedImageDigests.length} deleted image digests`);
                      }
                      if (CLEANUP_CACHES) {
                          console.log(`Caches:         ${DRY_RUN ? 'Would delete' : 'Deleted'} ${deletedCaches} old caches`);
                      }
                      console.log('='.repeat(60));

                  } catch (error) {
                      console.log(`\n⚠️ Cleanup failed: ${error.message}`);
                      console.log(`Stack trace: ${error.stack}`);
                      core.setFailed(`Cleanup failed: ${error.message}`);
                  }

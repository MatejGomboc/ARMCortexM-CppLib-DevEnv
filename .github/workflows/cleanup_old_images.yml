name: Cleanup Old Container Images, Attestations, and Caches

on:
    workflow_call:
        inputs:
            package_name:
                description: 'Name of the container package to clean'
                required: true
                type: string
            username:
                description: 'GitHub username/org that owns the package'
                required: true
                type: string
            bundle_size:
                description: 'Number of artifacts per bundle (default: 5)'
                required: false
                type: number
                default: 5
            keep_semantic_tagged:
                description: 'Keep bundles with semantic version tags (default: true)'
                required: false
                type: boolean
                default: true
            cleanup_attestations:
                description: 'Clean up attestations for deleted images (default: true)'
                required: false
                type: boolean
                default: true
            cleanup_caches:
                description: 'Clean up old GitHub Actions caches (default: true)'
                required: false
                type: boolean
                default: true
            cache_retention_days:
                description: 'Keep caches newer than this many days (default: 7)'
                required: false
                type: number
                default: 7
            dry_run:
                description: 'Perform dry-run without actual deletion (default: false)'
                required: false
                type: boolean
                default: false

jobs:
    cleanup:
        runs-on: ubuntu-latest

        permissions:
            packages: write
            contents: read
            attestations: write
            actions: write

        steps:
            - name: Clean up old container images, attestations, and caches
              uses: actions/github-script@v8
              with:
                script: |
                  // ============================================================
                  // NORMALIZE INPUT PARAMETERS
                  // ============================================================
                  const packageName = '${{ inputs.package_name }}'.toLowerCase();
                  const username = '${{ inputs.username }}'.toLowerCase();
                  
                  const BUNDLE_SIZE = ${{ inputs.bundle_size }};
                  const KEEP_SEMANTIC_TAGGED = ${{ inputs.keep_semantic_tagged }};
                  const CLEANUP_ATTESTATIONS = ${{ inputs.cleanup_attestations }};
                  const CLEANUP_CACHES = ${{ inputs.cleanup_caches }};
                  const CACHE_RETENTION_DAYS = ${{ inputs.cache_retention_days }};
                  const DRY_RUN = ${{ inputs.dry_run }};

                  console.log(`Normalized package name: ${packageName}`);
                  console.log(`Normalized username: ${username}\n`);

                  try {
                      // Initialize tracking variables at function scope
                      let deletedBundles = 0;
                      let deletedArtifacts = 0;
                      const deletedImageDigests = [];
                      let deletedCaches = 0;
                      let totalCacheSize = 0;

                      // ============================================================
                      // DRY RUN MODE INDICATOR
                      // ============================================================
                      
                      if (DRY_RUN) {
                          console.log('🔍'.repeat(30));
                          console.log('🔍 DRY RUN MODE - NO ACTUAL DELETIONS WILL OCCUR 🔍');
                          console.log('🔍'.repeat(30));
                          console.log('');
                      }

                      // ============================================================
                      // PHASE 1: CLEAN UP DOCKER IMAGES
                      // ============================================================
                      
                      console.log('='.repeat(60));
                      console.log('PHASE 1: CLEANING UP DOCKER IMAGES (ROBUST MODE)');
                      console.log('='.repeat(60));
                      console.log('');

                      // Fetch ALL package versions with pagination
                      let allVersions = [];
                      let page = 1;
                      let hasMore = true;

                      console.log('Fetching all package versions...');

                      while (hasMore) {
                          const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                              package_type: 'container',
                              package_name: packageName,
                              username: username,
                              per_page: 100,
                              page: page
                          });

                          allVersions = allVersions.concat(versions.data);
                          hasMore = versions.data.length === 100;
                          
                          console.log(`  Page ${page}: fetched ${versions.data.length} versions`);
                          
                          page++;

                          if (page > 10) {
                              console.log('⚠️ Reached safety limit of 10 pages (1000 versions)');
                              break;
                          }
                      }

                      // Sort by creation date (newest first)
                      allVersions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                      console.log(`\nFetched ${allVersions.length} total versions`);

                      if (allVersions.length === 0) {
                          console.log('No versions found, nothing to clean up');
                          return;
                      }

                      // Helper functions
                      const hasOnlySHATags = (tags) => {
                          return tags.length > 0 && tags.every(tag => tag.startsWith('sha256-') || tag.startsWith('sha256:'));
                      };

                      const hasSemanticTag = (tags) => {
                          return tags.some(tag => !tag.startsWith('sha256-') && !tag.startsWith('sha256:'));
                      };

                      // ============================================================
                      // ROBUST BUNDLE IDENTIFICATION
                      // ============================================================
                      // Find bundles using semantic tags as markers (position 4 in each bundle)
                      // This works even when some bundles are incomplete
                      
                      console.log('\nIdentifying bundles using semantic tag markers...');
                      
                      const bundles = [];
                      const orphanedVersions = new Set();
                      
                      // First, mark all versions as potentially orphaned
                      for (let i = 0; i < allVersions.length; i++) {
                          orphanedVersions.add(i);
                      }
                      
                      // Find bundle markers (semantic tags at position 4)
                      for (let i = 0; i < allVersions.length; i++) {
                          const version = allVersions[i];
                          
                          // Check if this version has a semantic tag (bundle marker)
                          if (hasSemanticTag(version.metadata.container.tags)) {
                              // This should be position 4 (oldest) in a bundle
                              // Collect the 4 versions immediately before it (newer)
                              const bundleStartIdx = i - 4;
                              
                              if (bundleStartIdx >= 0) {
                                  const potentialBundle = {
                                      versions: allVersions.slice(bundleStartIdx, i + 1),
                                      startIndex: bundleStartIdx,
                                      complete: (i - bundleStartIdx + 1) === BUNDLE_SIZE,
                                      isNewest: bundles.length === 0
                                  };
                                  
                                  bundles.push(potentialBundle);
                                  
                                  // Remove these indices from orphaned set
                                  for (let j = bundleStartIdx; j <= i; j++) {
                                      orphanedVersions.delete(j);
                                  }
                                  
                                  console.log(`  Found bundle at indices ${bundleStartIdx}-${i} (${potentialBundle.complete ? 'complete' : 'INCOMPLETE'})`);
                              }
                          }
                      }
                      
                      console.log(`\nIdentified ${bundles.length} bundles with semantic tags`);
                      console.log(`Found ${orphanedVersions.size} orphaned versions (not part of any bundle)`);
                      
                      // ============================================================
                      // DETECT DEPRECATED BUNDLES AMONG ORPHANS
                      // ============================================================
                      // Superseded "latest" bundles lose their semantic tag and become orphaned
                      // We need to explicitly identify these for better logging
                      
                      if (orphanedVersions.size >= BUNDLE_SIZE) {
                          console.log('\nChecking for deprecated bundles among orphaned versions...');
                          
                          const orphanedIndices = Array.from(orphanedVersions).sort((a, b) => a - b);
                          let deprecatedCount = 0;
                          
                          // Look for consecutive groups of exactly BUNDLE_SIZE orphans
                          for (let i = 0; i <= orphanedIndices.length - BUNDLE_SIZE; i++) {
                              // Check if we have BUNDLE_SIZE consecutive indices
                              let isConsecutive = true;
                              for (let j = 0; j < BUNDLE_SIZE - 1; j++) {
                                  if (orphanedIndices[i + j + 1] !== orphanedIndices[i + j] + 1) {
                                      isConsecutive = false;
                                      break;
                                  }
                              }
                              
                              if (!isConsecutive) continue;
                              
                              // We have a potential deprecated bundle
                              const potentialBundle = {
                                  versions: [],
                                  startIndex: orphanedIndices[i],
                                  complete: true,
                                  isNewest: false,
                                  deprecated: true
                              };
                              
                              for (let j = 0; j < BUNDLE_SIZE; j++) {
                                  potentialBundle.versions.push(allVersions[orphanedIndices[i + j]]);
                              }
                              
                              // Strict validation for deprecated bundles
                              const pos0 = potentialBundle.versions[0];
                              const pos4 = potentialBundle.versions[4];
                              
                              // Validate position 0: must have SHA256 tag only
                              if (!hasOnlySHATags(pos0.metadata.container.tags)) {
                                  console.log(`    Rejected: Position 0 must have SHA256 tag only, has: [${pos0.metadata.container.tags.join(', ')}]`);
                                  continue;
                              }
                              
                              // Validate positions 1-3: must be untagged
                              let hasInvalidMiddlePositions = false;
                              for (let k = 1; k <= 3; k++) {
                                  const posK = potentialBundle.versions[k];
                                  if (posK.metadata.container.tags.length > 0) {
                                      console.log(`    Rejected: Position ${k} must be untagged, has: [${posK.metadata.container.tags.join(', ')}]`);
                                      hasInvalidMiddlePositions = true;
                                      break;
                                  }
                              }
                              if (hasInvalidMiddlePositions) continue;
                              
                              // Validate position 4: must have no semantic tag (lost its "latest")
                              if (hasSemanticTag(pos4.metadata.container.tags)) {
                                  console.log(`    Rejected: Position 4 must not have semantic tags, has: [${pos4.metadata.container.tags.join(', ')}]`);
                                  continue;
                              }
                              
                              // Valid deprecated bundle - remove from orphaned set
                              for (let j = 0; j < BUNDLE_SIZE; j++) {
                                  orphanedVersions.delete(orphanedIndices[i + j]);
                              }
                              
                              bundles.push(potentialBundle);
                              deprecatedCount++;
                              console.log(`  Found deprecated bundle at indices ${orphanedIndices[i]}-${orphanedIndices[i + BUNDLE_SIZE - 1]}`);
                              
                              // Skip ahead since we've consumed these indices
                              i += BUNDLE_SIZE - 1;
                          }
                          
                          if (deprecatedCount > 0) {
                              console.log(`Found ${deprecatedCount} deprecated bundles (superseded "latest")`);
                              console.log(`Remaining orphaned versions: ${orphanedVersions.size}`);
                          }
                      }
                      
                      // ============================================================
                      // VALIDATE BUNDLE STRUCTURES
                      // ============================================================
                      
                      console.log('\nValidating bundle structures...');
                      
                      for (let i = 0; i < bundles.length; i++) {
                          const bundle = bundles[i];
                          
                          console.log(`\nBundle ${i + 1}:`);
                          console.log(`  Complete: ${bundle.complete}`);
                          console.log(`  Newest: ${bundle.isNewest}`);
                          console.log(`  Deprecated: ${bundle.deprecated || false}`);
                          
                          if (!bundle.complete) {
                              console.log(`  → DELETING (incomplete bundle from partial deployment)`);
                              bundle.shouldDelete = true;
                              continue;
                          }
                          
                          // Validate complete bundle structure
                          const pos0 = bundle.versions[0];
                          const pos4 = bundle.versions[4];
                          
                          // Position 0 must have SHA256 tag only (attestation)
                          if (!hasOnlySHATags(pos0.metadata.container.tags)) {
                              console.log(`  ⚠️  WARNING: Position 0 has invalid tags: [${pos0.metadata.container.tags.join(', ')}]`);
                              console.log(`  → DELETING (invalid structure)`);
                              bundle.shouldDelete = true;
                              continue;
                          }
                          
                          // Positions 1-3 must be untagged (artifacts)
                          let hasInvalidMiddle = false;
                          for (let j = 1; j <= 3; j++) {
                              if (bundle.versions[j].metadata.container.tags.length > 0) {
                                  console.log(`  ⚠️  WARNING: Position ${j} should be untagged, has: [${bundle.versions[j].metadata.container.tags.join(', ')}]`);
                                  hasInvalidMiddle = true;
                              }
                          }
                          if (hasInvalidMiddle) {
                              console.log(`  → DELETING (invalid structure)`);
                              bundle.shouldDelete = true;
                              continue;
                          }
                          
                          // Apply deletion policy
                          const tags = pos4.metadata.container.tags;
                          
                          if (bundle.deprecated) {
                              console.log(`  → DELETING (deprecated - superseded "latest" - no semantic tag)`);
                              bundle.shouldDelete = true;
                          } else if (!hasSemanticTag(tags)) {
                              console.log(`  → DELETING (no semantic tag - superseded "latest")`);
                              bundle.shouldDelete = true;
                          } else if (!KEEP_SEMANTIC_TAGGED && !bundle.isNewest) {
                              const semanticTags = tags.filter(t => !t.startsWith('sha256'));
                              console.log(`  Tags: [${semanticTags.join(', ')}]`);
                              console.log(`  → DELETING (policy: not keeping semantic tagged)`);
                              bundle.shouldDelete = true;
                          } else {
                              const semanticTags = tags.filter(t => !t.startsWith('sha256'));
                              console.log(`  Tags: [${semanticTags.join(', ')}]`);
                              console.log(`  → KEEPING`);
                              bundle.shouldDelete = false;
                          }
                      }
                      
                      // Count deletion summary
                      const bundlesToDelete = bundles.filter(b => b.shouldDelete);
                      const deprecatedToDelete = bundlesToDelete.filter(b => b.deprecated).length;
                      const incompleteToDelete = bundlesToDelete.filter(b => !b.complete).length;
                      
                      const totalArtifactsToDelete = bundlesToDelete.reduce((sum, b) => sum + b.versions.length, 0) + orphanedVersions.size;
                      
                      console.log(`\n${'='.repeat(60)}`);
                      console.log('DELETION SUMMARY');
                      console.log(`${'='.repeat(60)}`);
                      console.log(`${DRY_RUN ? 'Would delete' : 'Deleting'} ${bundlesToDelete.length} bundles:`);
                      if (deprecatedToDelete > 0) {
                          console.log(`  - ${deprecatedToDelete} deprecated (superseded "latest")`);
                      }
                      if (incompleteToDelete > 0) {
                          console.log(`  - ${incompleteToDelete} incomplete (partial deployment)`);
                      }
                      console.log(`${DRY_RUN ? 'Would delete' : 'Deleting'} ${orphanedVersions.size} orphaned versions`);
                      console.log(`Total artifacts to delete: ${totalArtifactsToDelete}`);
                      console.log(`${'='.repeat(60)}\n`);
                      
                      // ============================================================
                      // PERFORM DELETIONS
                      // ============================================================
                      
                      if (bundlesToDelete.length > 0 || orphanedVersions.size > 0) {
                          console.log('Performing deletions...\n');
                          
                          // Delete bundles
                          for (const bundle of bundlesToDelete) {
                              // Collect Docker image digest for attestation cleanup
                              const dockerImage = bundle.versions[4];
                              const dockerImageDigest = dockerImage.name;
                              if (dockerImageDigest && dockerImageDigest.startsWith('sha256:')) {
                                  deletedImageDigests.push(dockerImageDigest);
                              }
                              
                              for (const version of bundle.versions) {
                                  console.log(`  ${DRY_RUN ? 'Would delete' : 'Deleting'}: ${version.id} (${version.created_at})`);
                                  
                                  if (!DRY_RUN) {
                                      await github.rest.packages.deletePackageVersionForUser({
                                          package_type: 'container',
                                          package_name: packageName,
                                          username: username,
                                          package_version_id: version.id
                                      });
                                  }
                                  deletedArtifacts++;
                              }
                              deletedBundles++;
                          }
                          
                          // Delete orphaned versions
                          if (orphanedVersions.size > 0) {
                              console.log('\nDeleting orphaned versions:');
                              for (const idx of orphanedVersions) {
                                  const version = allVersions[idx];
                                  console.log(`  ${DRY_RUN ? 'Would delete' : 'Deleting'}: ${version.id} (${version.created_at})`);
                                  
                                  if (!DRY_RUN) {
                                      await github.rest.packages.deletePackageVersionForUser({
                                          package_type: 'container',
                                          package_name: packageName,
                                          username: username,
                                          package_version_id: version.id
                                      });
                                  }
                                  deletedArtifacts++;
                              }
                          }
                      }
                      
                      console.log(`\n✅ ${DRY_RUN ? 'Would delete' : 'Deleted'} ${deletedBundles} bundles + ${orphanedVersions.size} orphaned (${deletedArtifacts} total artifacts)`);
                      console.log(`Collected ${deletedImageDigests.length} image digests for attestation cleanup\n`);

                      // ============================================================
                      // PHASE 2: CLEAN UP ATTESTATIONS
                      // ============================================================
                      
                      if (CLEANUP_ATTESTATIONS && deletedImageDigests.length > 0) {
                          console.log('='.repeat(60));
                          console.log('PHASE 2: CLEANING UP ATTESTATIONS');
                          console.log('='.repeat(60));
                          console.log('');
                          
                          console.log(`Found ${deletedImageDigests.length} deleted Docker image digests`);
                          console.log(`${DRY_RUN ? 'Would clean up' : 'Cleaning up'} associated attestations...\n`);
                          
                          let deletedAttestations = 0;
                          let attestationErrors = 0;

                          for (const digest of deletedImageDigests) {
                              try {
                                  console.log(`${DRY_RUN ? 'Would delete' : 'Deleting'} attestations for image digest: ${digest.substring(0, 20)}...`);
                                  
                                  if (!DRY_RUN) {
                                      await github.request('DELETE /users/{username}/attestations/digest/{subject_digest}', {
                                          username: username,
                                          subject_digest: digest,
                                          headers: {
                                              'X-GitHub-Api-Version': '2022-11-28'
                                          }
                                      });
                                  }
                                  
                                  deletedAttestations++;
                                  console.log(`  ✅ ${DRY_RUN ? 'Would delete attestations for this image' : 'Deleted attestations for this image'}`);
                              } catch (error) {
                                  if (error.status === 404) {
                                      console.log(`  ℹ️  No attestations found for this digest`);
                                  } else {
                                      console.log(`  ⚠️  Error deleting attestations: ${error.message}`);
                                      attestationErrors++;
                                  }
                              }
                          }
                          
                          console.log(`\n✅ ${DRY_RUN ? 'Would delete' : 'Deleted'} attestations for ${deletedAttestations} image digests`);
                          if (attestationErrors > 0) {
                              console.log(`⚠️  ${attestationErrors} attestation deletion errors (non-fatal)`);
                          }
                          console.log('');
                      } else if (CLEANUP_ATTESTATIONS) {
                          console.log('ℹ️  No deleted image digests, skipping attestation cleanup\n');
                      }

                      // ============================================================
                      // PHASE 3: CLEAN UP OLD CACHES
                      // ============================================================
                      
                      if (CLEANUP_CACHES) {
                          console.log('='.repeat(60));
                          console.log('PHASE 3: CLEANING UP OLD GITHUB ACTIONS CACHES');
                          console.log('='.repeat(60));
                          console.log('');
                          
                          const cutoffDate = new Date();
                          cutoffDate.setDate(cutoffDate.getDate() - CACHE_RETENTION_DAYS);
                          console.log(`${DRY_RUN ? 'Would delete' : 'Deleting'} caches older than ${CACHE_RETENTION_DAYS} days (before ${cutoffDate.toISOString()})\n`);
                          
                          let cacheErrors = 0;

                          try {
                              let cachePage = 1;
                              let hasMoreCaches = true;
                              
                              while (hasMoreCaches) {
                                  const caches = await github.rest.actions.getActionsCacheList({
                                      owner: context.repo.owner,
                                      repo: context.repo.repo,
                                      per_page: 100,
                                      page: cachePage
                                  });
                                  
                                  console.log(`Fetched ${caches.data.actions_caches.length} caches (page ${cachePage})`);
                                  
                                  for (const cache of caches.data.actions_caches) {
                                      const cacheDate = new Date(cache.created_at);
                                      
                                      if (cacheDate < cutoffDate) {
                                          try {
                                              console.log(`  ${DRY_RUN ? 'Would delete' : 'Deleting'} cache: ${cache.key} (${(cache.size_in_bytes / 1024 / 1024).toFixed(2)} MB, created ${cache.created_at})`);
                                              
                                              if (!DRY_RUN) {
                                                  await github.rest.actions.deleteActionsCacheById({
                                                      owner: context.repo.owner,
                                                      repo: context.repo.repo,
                                                      cache_id: cache.id
                                                  });
                                              }
                                              
                                              deletedCaches++;
                                              totalCacheSize += cache.size_in_bytes;
                                          } catch (error) {
                                              console.log(`    ⚠️  Error deleting cache: ${error.message}`);
                                              cacheErrors++;
                                          }
                                      }
                                  }
                                  
                                  hasMoreCaches = caches.data.actions_caches.length === 100;
                                  cachePage++;
                                  
                                  if (cachePage > 10) {
                                      console.log('⚠️ Reached safety limit of 10 pages for caches');
                                      break;
                                  }
                              }
                              
                              const totalCacheSizeMB = (totalCacheSize / 1024 / 1024).toFixed(2);
                              console.log(`\n✅ ${DRY_RUN ? 'Would delete' : 'Deleted'} ${deletedCaches} old caches (${DRY_RUN ? 'would free' : 'freed'} ${totalCacheSizeMB} MB)`);
                              if (cacheErrors > 0) {
                                  console.log(`⚠️  ${cacheErrors} cache deletion errors (non-fatal)`);
                              }
                              console.log('');
                              
                          } catch (error) {
                              console.log(`⚠️ Cache cleanup failed: ${error.message}`);
                              console.log('Continuing with workflow (cache cleanup is non-fatal)\n');
                          }
                      }

                      // ============================================================
                      // CLEANUP SUMMARY
                      // ============================================================
                      
                      console.log('='.repeat(60));
                      console.log('CLEANUP SUMMARY');
                      if (DRY_RUN) {
                          console.log('(DRY RUN - NO ACTUAL DELETIONS PERFORMED)');
                      }
                      console.log('='.repeat(60));
                      console.log(`Docker Images:  ${DRY_RUN ? 'Would delete' : 'Deleted'} ${deletedBundles} bundles (${deletedArtifacts} artifacts)`);
                      if (CLEANUP_ATTESTATIONS) {
                          console.log(`Attestations:   ${DRY_RUN ? 'Would clean up' : 'Cleaned up'} for ${deletedImageDigests.length} deleted image digests`);
                      }
                      if (CLEANUP_CACHES) {
                          console.log(`Caches:         ${DRY_RUN ? 'Would delete' : 'Deleted'} ${deletedCaches} old caches`);
                      }
                      console.log('='.repeat(60));

                  } catch (error) {
                      console.log(`\n⚠️ Cleanup failed: ${error.message}`);
                      console.log(`Stack trace: ${error.stack}`);
                      core.setFailed(`Cleanup failed: ${error.message}`);
                  }

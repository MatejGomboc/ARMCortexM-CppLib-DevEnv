name: Cleanup Old Container Images, Attestations, and Caches

on:
    workflow_call:
        inputs:
            package_name:
                description: 'Name of the container package to clean'
                required: true
                type: string
            username:
                description: 'GitHub username/org that owns the package'
                required: true
                type: string
            bundle_size:
                description: 'Number of artifacts per bundle (default: 5)'
                required: false
                type: number
                default: 5
            keep_semantic_tagged:
                description: 'Keep bundles with semantic version tags (default: true)'
                required: false
                type: boolean
                default: true
            cleanup_attestations:
                description: 'Clean up attestations for deleted images (default: true)'
                required: false
                type: boolean
                default: true
            cleanup_caches:
                description: 'Clean up old GitHub Actions caches (default: true)'
                required: false
                type: boolean
                default: true
            cache_retention_days:
                description: 'Keep caches newer than this many days (default: 7)'
                required: false
                type: number
                default: 7
            dry_run:
                description: 'Perform dry-run without actual deletion (default: false)'
                required: false
                type: boolean
                default: false

jobs:
    cleanup:
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read
            attestations: write
            actions: write
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            
            - name: Run cleanup script
              uses: actions/github-script@v8
              env:
                  INPUT_PACKAGE_NAME: ${{ inputs.package_name }}
                  INPUT_USERNAME: ${{ inputs.username }}
                  INPUT_BUNDLE_SIZE: ${{ inputs.bundle_size }}
                  INPUT_KEEP_SEMANTIC_TAGGED: ${{ inputs.keep_semantic_tagged }}
                  INPUT_CLEANUP_ATTESTATIONS: ${{ inputs.cleanup_attestations }}
                  INPUT_CLEANUP_CACHES: ${{ inputs.cleanup_caches }}
                  INPUT_CACHE_RETENTION_DAYS: ${{ inputs.cache_retention_days }}
                  INPUT_DRY_RUN: ${{ inputs.dry_run }}
              with:
                  script: |
                      const cleanupScript = require('./.github/scripts/cleanup-packages.js');
                      await cleanupScript({ github, context, core });

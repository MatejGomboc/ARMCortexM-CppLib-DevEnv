name: Cleanup Old Container Images, Attestations, and Caches

on:
    workflow_call:
        inputs:
            package_name:
                description: 'Name of the container package to clean'
                required: true
                type: string
            username:
                description: 'GitHub username/org that owns the package'
                required: true
                type: string
            bundle_size:
                description: 'Number of artifacts per bundle (default: 5)'
                required: false
                type: number
                default: 5
            keep_semantic_tagged:
                description: 'Keep bundles with semantic version tags (default: true)'
                required: false
                type: boolean
                default: true
            cleanup_attestations:
                description: 'Clean up attestations for deleted images (default: true)'
                required: false
                type: boolean
                default: true
            cleanup_caches:
                description: 'Clean up old GitHub Actions caches (default: true)'
                required: false
                type: boolean
                default: true
            cache_retention_days:
                description: 'Keep caches newer than this many days (default: 7)'
                required: false
                type: number
                default: 7

jobs:
    cleanup:
        runs-on: ubuntu-latest

        permissions:
            packages: write
            contents: read
            attestations: write
            actions: write

        steps:
            - name: Clean up old container images, attestations, and caches
              uses: actions/github-script@v8
              with:
                script: |
                  const packageName = '${{ inputs.package_name }}';
                  const username = '${{ inputs.username }}';
                  const BUNDLE_SIZE = ${{ inputs.bundle_size }};
                  const KEEP_SEMANTIC_TAGGED = ${{ inputs.keep_semantic_tagged }};
                  const CLEANUP_ATTESTATIONS = ${{ inputs.cleanup_attestations }};
                  const CLEANUP_CACHES = ${{ inputs.cleanup_caches }};
                  const CACHE_RETENTION_DAYS = ${{ inputs.cache_retention_days }};

                  try {
                      // ============================================================
                      // PHASE 1: CLEAN UP DOCKER IMAGES
                      // ============================================================
                      
                      console.log('='.repeat(60));
                      console.log('PHASE 1: CLEANING UP DOCKER IMAGES');
                      console.log('='.repeat(60));
                      console.log('');

                      // Fetch ALL package versions with pagination.
                      // This ensures we don't miss old bundles if previous cleanup failed.
                      let allVersions = [];
                      let page = 1;
                      let hasMore = true;

                      console.log('Fetching all package versions...');

                      while (hasMore) {
                          const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByUser({
                              package_type: 'container',
                              package_name: packageName,
                              username: username,
                              per_page: 100,  // Maximum allowed per page
                              page: page
                          });

                          allVersions = allVersions.concat(versions.data);
                          hasMore = versions.data.length === 100;  // Check if there might be more pages
                          
                          console.log(`  Page ${page}: fetched ${versions.data.length} versions`);
                          
                          page++;

                          // Safety limit to prevent infinite loops (max 1000 versions)
                          if (page > 10) {
                              console.log('⚠️ Reached safety limit of 10 pages (1000 versions)');
                              break;
                          }
                      }

                      // Sort by creation date (newest first).
                      allVersions.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                      console.log(`\nFetched ${allVersions.length} total versions`);

                      // STRICT CHECK: Fetched versions must be divisible by bundle size.
                      if (allVersions.length % BUNDLE_SIZE !== 0) {
                          console.log(`\n❌ ERROR: Fetched versions (${allVersions.length}) is not divisible by ${BUNDLE_SIZE}!`);
                          console.log('All bundles must be complete. Aborting cleanup.\n');
                          console.log('Current versions in registry:');
                          allVersions.forEach((v, idx) => {
                              const tags = v.metadata.container.tags;
                              const tagInfo = tags.length > 0 ? `[TAGGED: ${tags.join(', ')}]` : '[untagged]';
                              console.log(`  ${idx + 1}. ID: ${v.id} | Created: ${v.created_at} | ${tagInfo}`);
                          });
                          core.setFailed('Cleanup aborted: incomplete bundles detected');
                          return;
                      }

                      // Group into bundles.
                      const bundles = [];
                      for (let i = 0; i < allVersions.length; i += BUNDLE_SIZE) {
                          bundles.push(allVersions.slice(i, i + BUNDLE_SIZE));
                      }

                      console.log(`Grouped into ${bundles.length} complete bundles of ${BUNDLE_SIZE}`);

                      if (bundles.length === 0) {
                          console.log('No bundles found, nothing to clean up');
                          return;
                      }

                      // Helper function to check if tags contain only SHA256 digests.
                      const hasOnlySHATags = (tags) => {
                          return tags.length > 0 && tags.every(tag => tag.startsWith('sha256-') || tag.startsWith('sha256:'));
                      };

                      // Helper function to check if tags contain semantic version tags.
                      const hasSemanticTag = (tags) => {
                          return tags.some(tag => !tag.startsWith('sha256-') && !tag.startsWith('sha256:'));
                      };

                      // STRICT VALIDATION: Check EXACT structure of every bundle.
                      for (let i = 0; i < bundles.length; i++) {
                          const bundle = bundles[i];
                          const isNewest = (i === 0);

                          // Position 0 (newest in bundle): MUST have SHA256 tag ONLY.
                          const pos0 = bundle[0];
                          if (!hasOnlySHATags(pos0.metadata.container.tags)) {
                              console.log(`\n❌ ERROR: Bundle ${i + 1} has invalid structure at position 0!`);
                              console.log('Position 0 must have SHA256 tag only (attestation).\n');
                              console.log(`Details of Bundle ${i + 1}:`);
                              bundle.forEach((v, idx) => {
                                  const tags = v.metadata.container.tags;
                                  const tagInfo = tags.length > 0 ? `[TAGGED: ${tags.join(', ')}]` : '[untagged]';
                                  console.log(`  Position ${idx}: ID ${v.id} | ${tagInfo}`);
                              });
                              core.setFailed('Cleanup aborted: bundle structure validation failed');
                              return;
                          }

                          // Positions 1-3: MUST be untagged.
                          for (let j = 1; j <= 3; j++) {
                              const artifact = bundle[j];
                              if (artifact.metadata.container.tags.length > 0) {
                                  console.log(`\n❌ ERROR: Bundle ${i + 1} has invalid structure at position ${j}!`);
                                  console.log(`Position ${j} must be untagged (artifact).\n`);
                                  console.log(`Details of Bundle ${i + 1}:`);
                                  bundle.forEach((v, idx) => {
                                      const tags = v.metadata.container.tags;
                                      const tagInfo = tags.length > 0 ? `[TAGGED: ${tags.join(', ')}]` : '[untagged]';
                                      console.log(`  Position ${idx}: ID ${v.id} | ${tagInfo}`);
                                  });
                                  core.setFailed('Cleanup aborted: bundle structure validation failed');
                                  return;
                              }
                          }

                          // Position 4 (oldest in bundle): Docker image.
                          const pos4 = bundle[4];
                          if (isNewest) {
                              // NEWEST bundle: Position 4 MUST have semantic tag (latest or 1.2.3).
                              if (!hasSemanticTag(pos4.metadata.container.tags)) {
                                  console.log(`\n❌ ERROR: Bundle ${i + 1} (newest) has invalid structure at position 4!`);
                                  console.log('Position 4 must have semantic tag like "latest" or "1.2.3" (Docker image).\n');
                                  console.log(`Details of Bundle ${i + 1}:`);
                                  bundle.forEach((v, idx) => {
                                      const tags = v.metadata.container.tags;
                                      const tagInfo = tags.length > 0 ? `[TAGGED: ${tags.join(', ')}]` : '[untagged]';
                                      console.log(`  Position ${idx}: ID ${v.id} | ${tagInfo}`);
                                  });
                                  core.setFailed('Cleanup aborted: newest bundle structure validation failed');
                                  return;
                              }
                          } else {
                              // OLDER bundles: Position 4 can be either:
                              // - Untagged (superseded "latest" - will be deleted).
                              // - Tagged with version (1.2.3 - will be kept if KEEP_SEMANTIC_TAGGED is true).
                              // No validation needed - deletion logic handles this correctly.
                          }
                      }

                      console.log('✅ All bundles have valid structure!\n');

                      // Log newest bundle info.
                      const newestBundle = bundles[0];
                      const newestDockerImage = newestBundle[4];
                      const semanticTags = newestDockerImage.metadata.container.tags.filter(tag =>
                          !tag.startsWith('sha256-') && !tag.startsWith('sha256:')
                      );
                      console.log(`✅ Newest bundle Docker image tagged as "${semanticTags.join(', ')}"\n`);

                      let deletedBundles = 0;
                      let deletedArtifacts = 0;
                      const deletedDigests = [];  // Track digests for attestation cleanup

                      for (let i = 0; i < bundles.length; i++) {
                          const bundle = bundles[i];

                          // Position 4 is the Docker image.
                          const dockerImage = bundle[4];
                          const tags = dockerImage.metadata.container.tags;

                          // Determine if this bundle should be deleted.
                          let shouldDelete = false;

                          if (!hasSemanticTag(tags)) {
                              // No semantic tag = superseded "latest" → DELETE entire bundle.
                              shouldDelete = true;
                          } else if (!KEEP_SEMANTIC_TAGGED && i !== 0) {
                              // If not keeping semantic tagged and not the newest bundle → DELETE.
                              shouldDelete = true;
                          }

                          if (shouldDelete) {
                              const tagInfo = hasOnlySHATags(tags) ? `only SHA tags: ${tags.join(', ')}` :
                                              hasSemanticTag(tags) ? `semantic tags: ${tags.filter(t => !t.startsWith('sha256')).join(', ')}` :
                                              'untagged';
                              console.log(`Bundle ${i + 1}: Docker image ${tagInfo} → DELETING`);

                              for (const version of bundle) {
                                  console.log(`  - ${version.id} (${version.created_at})`);
                                  
                                  // Extract digest from package name (format: sha256:abc123...)
                                  if (version.name && version.name.startsWith('sha256:')) {
                                      deletedDigests.push(version.name);
                                  }
                                  
                                  await github.rest.packages.deletePackageVersionForUser({
                                      package_type: 'container',
                                      package_name: packageName,
                                      username: username,
                                      package_version_id: version.id
                                  });
                                  deletedArtifacts++;
                              }
                              deletedBundles++;
                          } else {
                              // Has semantic tag and we're keeping them → KEEP entire bundle.
                              const semanticTags = tags.filter(tag => !tag.startsWith('sha256-') && !tag.startsWith('sha256:'));
                              console.log(`Bundle ${i + 1}: Docker image tagged "${semanticTags.join(', ')}" → KEEPING`);
                          }
                      }

                      console.log(`\n✅ Deleted ${deletedBundles} bundles (${deletedArtifacts} artifacts)`);
                      console.log(`Collected ${deletedDigests.length} digests for attestation cleanup\n`);

                      // ============================================================
                      // PHASE 2: CLEAN UP ATTESTATIONS
                      // ============================================================
                      
                      if (CLEANUP_ATTESTATIONS && deletedDigests.length > 0) {
                          console.log('='.repeat(60));
                          console.log('PHASE 2: CLEANING UP ATTESTATIONS');
                          console.log('='.repeat(60));
                          console.log('');
                          
                          console.log(`Found ${deletedDigests.length} deleted package digests`);
                          console.log('Cleaning up associated attestations...\n');
                          
                          let deletedAttestations = 0;
                          let attestationErrors = 0;

                          for (const digest of deletedDigests) {
                              try {
                                  console.log(`Deleting attestations for digest: ${digest.substring(0, 20)}...`);
                                  
                                  // Use the REST API to delete attestations by subject digest
                                  await github.request('DELETE /users/{username}/attestations/digest/{subject_digest}', {
                                      username: username,
                                      subject_digest: digest,
                                      headers: {
                                          'X-GitHub-Api-Version': '2022-11-28'
                                      }
                                  });
                                  
                                  deletedAttestations++;
                              } catch (error) {
                                  // 404 is expected if no attestations exist for this digest
                                  if (error.status === 404) {
                                      console.log(`  ℹ️  No attestations found for this digest`);
                                  } else {
                                      console.log(`  ⚠️  Error deleting attestations: ${error.message}`);
                                      attestationErrors++;
                                  }
                              }
                          }
                          
                          console.log(`\n✅ Deleted attestations for ${deletedAttestations} digests`);
                          if (attestationErrors > 0) {
                              console.log(`⚠️  ${attestationErrors} attestation deletion errors (non-fatal)`);
                          }
                          console.log('');
                      } else if (CLEANUP_ATTESTATIONS) {
                          console.log('ℹ️  No deleted digests, skipping attestation cleanup\n');
                      }

                      // ============================================================
                      // PHASE 3: CLEAN UP OLD CACHES
                      // ============================================================
                      
                      if (CLEANUP_CACHES) {
                          console.log('='.repeat(60));
                          console.log('PHASE 3: CLEANING UP OLD GITHUB ACTIONS CACHES');
                          console.log('='.repeat(60));
                          console.log('');
                          
                          const cutoffDate = new Date();
                          cutoffDate.setDate(cutoffDate.getDate() - CACHE_RETENTION_DAYS);
                          console.log(`Deleting caches older than ${CACHE_RETENTION_DAYS} days (before ${cutoffDate.toISOString()})\n`);
                          
                          let deletedCaches = 0;
                          let totalCacheSize = 0;
                          let cacheErrors = 0;

                          try {
                              // Fetch all caches with pagination
                              let cachePage = 1;
                              let hasMoreCaches = true;
                              
                              while (hasMoreCaches) {
                                  const caches = await github.rest.actions.getActionsCacheList({
                                      owner: context.repo.owner,
                                      repo: context.repo.repo,
                                      per_page: 100,
                                      page: cachePage
                                  });
                                  
                                  console.log(`Fetched ${caches.data.actions_caches.length} caches (page ${cachePage})`);
                                  
                                  for (const cache of caches.data.actions_caches) {
                                      const cacheDate = new Date(cache.created_at);
                                      
                                      if (cacheDate < cutoffDate) {
                                          try {
                                              console.log(`  Deleting cache: ${cache.key} (${(cache.size_in_bytes / 1024 / 1024).toFixed(2)} MB, created ${cache.created_at})`);
                                              
                                              await github.rest.actions.deleteActionsCacheById({
                                                  owner: context.repo.owner,
                                                  repo: context.repo.repo,
                                                  cache_id: cache.id
                                              });
                                              
                                              deletedCaches++;
                                              totalCacheSize += cache.size_in_bytes;
                                          } catch (error) {
                                              console.log(`    ⚠️  Error deleting cache: ${error.message}`);
                                              cacheErrors++;
                                          }
                                      }
                                  }
                                  
                                  hasMoreCaches = caches.data.actions_caches.length === 100;
                                  cachePage++;
                                  
                                  // Safety limit
                                  if (cachePage > 10) {
                                      console.log('⚠️ Reached safety limit of 10 pages for caches');
                                      break;
                                  }
                              }
                              
                              const totalCacheSizeMB = (totalCacheSize / 1024 / 1024).toFixed(2);
                              console.log(`\n✅ Deleted ${deletedCaches} old caches (freed ${totalCacheSizeMB} MB)`);
                              if (cacheErrors > 0) {
                                  console.log(`⚠️  ${cacheErrors} cache deletion errors (non-fatal)`);
                              }
                              console.log('');
                              
                          } catch (error) {
                              console.log(`⚠️ Cache cleanup failed: ${error.message}`);
                              console.log('Continuing with workflow (cache cleanup is non-fatal)\n');
                          }
                      }

                      // ============================================================
                      // CLEANUP SUMMARY
                      // ============================================================
                      
                      console.log('='.repeat(60));
                      console.log('CLEANUP SUMMARY');
                      console.log('='.repeat(60));
                      console.log(`Docker Images:  Deleted ${deletedBundles} bundles (${deletedArtifacts} artifacts)`);
                      if (CLEANUP_ATTESTATIONS) {
                          console.log(`Attestations:   Cleaned up for ${deletedDigests.length} deleted digests`);
                      }
                      if (CLEANUP_CACHES) {
                          console.log(`Caches:         Deleted ${deletedCaches} old caches`);
                      }
                      console.log('='.repeat(60));

                  } catch (error) {
                      console.log(`\n⚠️ Cleanup failed: ${error.message}`);
                      console.log(`Stack trace: ${error.stack}`);
                      core.setFailed(`Cleanup failed: ${error.message}`);
                  }
